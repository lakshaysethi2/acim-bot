services:
  acim-bot:
    build: .
    container_name: acim-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HEALTH_PORT:-8080}:${HEALTH_PORT:-8080}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    stop_grace_period: 10s
